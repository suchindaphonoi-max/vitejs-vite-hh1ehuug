<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- ตั้งค่าให้เหมาะกับหน้าจอมือถือ ไม่ให้ซูมเข้าออกเวลาจิ้มรัวๆ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OMR Scanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- โค้ดส่วนนี้แหละครับที่หายไป (CSS แก้ปัญหาการหน่วงเวลากดปุ่มบนมือถือ) -->
    <style>
      body {
        touch-action: manipulation; /* ป้องกันการ delay เวลากดปุ่มบนมือถือ */
        -webkit-tap-highlight-color: transparent; /* เอาไฮไลท์สีฟ้าตอนกดออก */
      }
      button {
        cursor: pointer;
        z-index: 50; 
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
